<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏰 魔法三角形王國</title>
    <style>
        /* 引入可愛的圓體字型 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        body {
            font-family: 'Nunito', 'Microsoft JhengHei', 'Comic Sans MS', sans-serif;
            background-color: #e0f7fa; /* 淺藍色天空背景 */
            background-image: radial-gradient(#b2ebf2 20%, transparent 20%), radial-gradient(#b2ebf2 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #333;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: #ffb300;
            text-shadow: 2px 2px 0px #ff6f00, 4px 4px 0px rgba(0,0,0,0.1);
            font-size: 32px;
            margin: 10px 0;
            text-align: center;
        }

        #loading-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #ffb300;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #camera-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
            background-color: #000;
            border: 6px solid #ffb300;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute; /* 新增定位讓視訊與畫布重疊 */
            top: 0; left: 0;
            display: none; 
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            display: none; /* 預設先隱藏，拍照後才顯示 */
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border: 2px dashed rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }

        #result-panel {
            width: 100%;
            max-width: 600px;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 4px solid #4fc3f7;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .type-badge {
            display: inline-block;
            background-color: #ff5252;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 10px;
            box-shadow: 0 4px 0px #c62828;
        }

        #reason-text {
            font-size: 18px;
            color: #455a64;
            line-height: 1.5;
            margin: 0;
            font-weight: bold;
        }

        #start-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0px #2e7d32;
            margin-top: 20px;
            font-family: inherit;
        }
        #start-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        /* 👑 Gemini LLM 專屬樣式 */
        .gemini-btn {
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0px #7b1fa2;
            margin-top: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .gemini-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .gemini-btn:disabled {
            background-color: #bdbdbd;
            box-shadow: 0 5px 0px #9e9e9e;
            transform: none;
            cursor: not-allowed;
        }
        #story-panel {
            background-color: #fff9c4;
            border: 3px dashed #fbc02d;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            font-size: 18px;
            color: #5d4037;
            text-align: left;
            line-height: 1.6;
            display: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <h2 style="color: #ffb300;">準備魔法放大鏡中...</h2>
        <p>請稍等一下下喔！</p>
    </div>

    <h1>🏰 魔法三角形王國 👑</h1>
    
    <div id="camera-container">
        <video id="videoInput" autoplay playsinline></video>
        <!-- 顯示處理後畫面的畫布 -->
        <canvas id="canvasOutput"></canvas>
        <!-- 幫助對準的準心 -->
        <div id="crosshair"></div>
    </div>
    
    <div id="result-panel">
        <div>
            <div id="triangle-type" class="type-badge" style="background-color: #9e9e9e; box-shadow: 0 4px 0px #616161;">
                尋找三角形中... 👀
            </div>
        </div>
        <p id="reason-text">請把畫好的三角形放在魔法放大鏡（鏡頭）前面喔！背景越乾淨越好！</p>
        
        <!-- 錯誤提示區 (新增) -->
        <div id="error-log" style="color: red; font-size: 14px; margin-top: 10px; font-weight: bold;"></div>

        <!-- ✨ 串接 Gemini API 的新按鈕與故事區域 -->
        <button id="ask-king-btn" class="gemini-btn hidden" onclick="askKing()">✨ 聽國王說故事 ✨</button>
        <div id="story-panel"></div>

        <button id="start-btn" class="hidden" onclick="handleMainAction()">開啟魔法鏡頭 📷</button>
    </div>

<script>
    const apiKey = ""; // Gemini API Key 自動載入
    let currentDetectedType = "";
    let previousDetectedType = "";
    let isStoryLoading = false;
    let isInitialized = false; // 新增：防止重複初始化
    let appState = 'init'; // 新增：狀態管理 (init, live, photo)

    let video = document.getElementById('videoInput');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d', { willReadFrequently: true });
    let streaming = false;
    let src, dst, gray, edges;
    let lastResultTime = 0;

    // 【修正1】使用 Module.onRuntimeInitialized 確保 OpenCV 核心完全載入
    var Module = {
        onRuntimeInitialized: function() {
            onOpenCvReady();
        }
    };

    // 當 OpenCV 載入完成
    function onOpenCvReady() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('start-btn').classList.remove('hidden');
        
        // 【修正2】檢查是否在本地端開啟 (iPad 本地檔案會擋相機)
        if (window.location.protocol === 'file:') {
            document.getElementById('reason-text').innerHTML = "<span style='color:red;'>⚠️ 警告：蘋果的規定，不能直接點開本機檔案使用相機！<br>請將這個網頁上傳到網站(HTTPS)才能使用喔。</span>";
        } else {
            document.getElementById('reason-text').innerText = "點擊下方的按鈕，開啟你的魔法鏡頭吧！";
        }
    }

    // 載入失敗時的提示
    function onOpenCvError() {
        document.getElementById('loading-screen').innerHTML = '<div style="text-align:center;"><h2 style="color: #f44336;">哎呀！魔法工具下載失敗 😭</h2><p>網路似乎阻擋了這個工具，所有的魔法連線都失敗了。<br>請試著改用「手機分享的熱點網路」，然後重新整理網頁再試一次喔！</p></div>';
    }

    // 處理主要按鈕點擊事件 (新增)
    function handleMainAction() {
        if (appState === 'init') {
            startCamera();
        } else if (appState === 'live') {
            takePhoto();
        } else if (appState === 'photo') {
            retakePhoto();
        }
    }

    // 啟動鏡頭 (針對 iPad 後鏡頭優化)
    function startCamera() {
        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('reason-text').innerText = "魔法鏡頭開啟中...";
        document.getElementById('error-log').innerText = "";

        // 請求後置鏡頭 (environment)
        let constraints = {
            video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                video.srcObject = stream;
                video.play();
                streaming = true;
                video.style.display = 'block'; // 顯示即時影像
                video.oncanplay = function() {
                    // 防止 video.oncanplay 觸發多次導致記憶體崩潰
                    if (!isInitialized) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        initOpenCV();
                        isInitialized = true;
                        
                        // 進入預備拍照模式
                        appState = 'live';
                        let btn = document.getElementById('start-btn');
                        btn.classList.remove('hidden');
                        btn.innerText = "📸 拍照分析";
                        btn.style.backgroundColor = "#4caf50";
                        btn.style.boxShadow = "0 6px 0px #2e7d32";
                        updateUI("等待拍照中... 📷", "#9e9e9e", "請將三角形對準畫面，然後按下「拍照分析」！");
                    }
                };
            })
            .catch(function(err) {
                document.getElementById('reason-text').innerText = "哎呀！魔法鏡頭打不開 😭 請確認有沒有允許使用相機喔！";
                document.getElementById('error-log').innerText = "詳細錯誤: " + err.message + " (如果您在 Safari 中，請檢查網址列左邊的相機權限)";
                console.error("相機錯誤:", err);
            });
    }

    function initOpenCV() {
        src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
        dst = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
        gray = new cv.Mat();
        edges = new cv.Mat();
    }

    // --- 新增：拍照與重新拍照功能 ---
    function takePhoto() {
        appState = 'photo';
        let btn = document.getElementById('start-btn');
        btn.innerText = "🔄 重新拍照";
        btn.style.backgroundColor = "#ff9800"; // 橘色
        btn.style.boxShadow = "0 6px 0px #e65100";
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        
        processImage(); // 執行一次性影像分析
    }

    function retakePhoto() {
        appState = 'live';
        let btn = document.getElementById('start-btn');
        btn.innerText = "📸 拍照分析";
        btn.style.backgroundColor = "#4caf50"; // 綠色
        btn.style.boxShadow = "0 6px 0px #2e7d32";
        
        video.style.display = 'block';
        canvas.style.display = 'none';
        
        updateUI("等待拍照中... 📷", "#9e9e9e", "請將三角形對準畫面，然後按下「拍照分析」！");
        document.getElementById('story-panel').style.display = 'none';
        document.getElementById('ask-king-btn').classList.add('hidden');
        currentDetectedType = "";
    }

    // 單次影像處理核心 (取代原本的 processVideo 迴圈)
    function processImage() {
        if (!streaming) return;

        try {
            // 將攝影機當前畫面畫到 Canvas 上
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            // 影像處理：灰階 -> 模糊 -> 邊緣偵測
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 0, 0, cv.BORDER_DEFAULT);
            cv.Canny(gray, edges, 40, 120); 

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            src.copyTo(dst);
            let largestTriangleArea = 0;
            let bestTriangle = null;

            // 找最大的三角形
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                
                if (area > 2000) {
                    let approx = new cv.Mat();
                    let epsilon = 0.05 * cv.arcLength(cnt, true);
                    cv.approxPolyDP(cnt, approx, epsilon, true);

                    if (approx.rows === 3) {
                        if (area > largestTriangleArea) {
                            largestTriangleArea = area;
                            if (bestTriangle) bestTriangle.delete();
                            bestTriangle = approx.clone();
                        }
                    }
                    approx.delete();
                }
            }

            // 如果有找到三角形
            if (bestTriangle) {
                // 取得三個頂點座標
                let p1 = { x: bestTriangle.data32S[0], y: bestTriangle.data32S[1] };
                let p2 = { x: bestTriangle.data32S[2], y: bestTriangle.data32S[3] };
                let p3 = { x: bestTriangle.data32S[4], y: bestTriangle.data32S[5] };

                // 進行分析並畫上色彩與直角符號
                analyzeAndDrawTriangle(p1, p2, p3);

                bestTriangle.delete();
            } else {
                updateUI("找不到三角形 😢", "#9e9e9e", "請重新拍照，並確保三角形線條清楚喔！");
            }

            // 將處理後的畫面顯示到 Canvas
            cv.imshow('canvasOutput', dst);
            contours.delete(); hierarchy.delete();
        } catch (err) {
            document.getElementById('error-log').innerText = "影像處理小精靈遇到問題了: " + err.message;
        }
    }

    // 分析形狀並繪製邊長顏色與直角符號 (取代 analyzeTriangleKidFriendly)
    function analyzeAndDrawTriangle(p1, p2, p3) {
        // 計算三邊長
        const dist = (p, q) => Math.hypot(p.x - q.x, p.y - q.y);
        let l1 = dist(p1, p2); // 邊 p1-p2
        let l2 = dist(p2, p3); // 邊 p2-p3
        let l3 = dist(p3, p1); // 邊 p3-p1
        
        let sides = [l1, l2, l3].sort((a, b) => a - b);
        let s1 = sides[0], s2 = sides[1], s3 = sides[2];

        // 算三個角
        const getAngle = (a, b, opp) => Math.acos(Math.max(-1, Math.min(1, (a*a + b*b - opp*opp) / (2 * a * b)))) * (180 / Math.PI);
        let angleC = getAngle(s1, s2, s3); // 最大角
        let a1 = getAngle(l1, l3, l2); // p1 的角
        let a2 = getAngle(l1, l2, l3); // p2 的角
        let a3 = getAngle(l2, l3, l1); // p3 的角

        // 🌟 將邊長與角度的誤差嚴格限制在 5% 以內
        const sideRatioTolerance = 0.05; // 邊長誤差縮小到 5%
        const angleTolerance = 4.5;      // 直角誤差縮小到 4.5 度 (剛好是 90 度的 5%)
        const isEqual = (a, b) => Math.abs(a - b) / Math.max(a, b) <= sideRatioTolerance;
        const isRightAngle = (a) => Math.abs(a - 90) <= angleTolerance;

        let isIsosceles = isEqual(s1, s2) || isEqual(s2, s3);
        let isEquilateral = isEqual(s1, s3);
        let isRight = isRightAngle(angleC);

        // --- 根據長度給予邊線不同顏色 ---
        let cvRed = new cv.Scalar(255, 82, 82, 255);   // 粉紅/紅 (相同邊長主要顏色)
        let cvBlue = new cv.Scalar(68, 138, 255, 255); // 藍色
        let cvGreen = new cv.Scalar(76, 175, 80, 255); // 綠色
        
        let c1, c2, c3;
        if (isEquilateral) {
            // 三邊等長：全紅色
            c1 = c2 = c3 = cvRed;
        } else if (isEqual(l1, l2)) {
            // l1, l2 等長
            c1 = c2 = cvRed; c3 = cvBlue;
        } else if (isEqual(l2, l3)) {
            // l2, l3 等長
            c2 = c3 = cvRed; c1 = cvBlue;
        } else if (isEqual(l1, l3)) {
            // l1, l3 等長
            c1 = c3 = cvRed; c2 = cvBlue;
        } else {
            // 三邊都不等長：三種顏色
            c1 = cvRed; c2 = cvBlue; c3 = cvGreen;
        }

        // 畫出帶顏色的邊
        cv.line(dst, new cv.Point(p1.x, p1.y), new cv.Point(p2.x, p2.y), c1, 8);
        cv.line(dst, new cv.Point(p2.x, p2.y), new cv.Point(p3.x, p3.y), c2, 8);
        cv.line(dst, new cv.Point(p3.x, p3.y), new cv.Point(p1.x, p1.y), c3, 8);

        // --- 畫直角符號 ---
        const drawRtSymbol = (pCorner, pA, pB) => {
            let vA = { x: pA.x - pCorner.x, y: pA.y - pCorner.y };
            let vB = { x: pB.x - pCorner.x, y: pB.y - pCorner.y };
            let lenA = Math.hypot(vA.x, vA.y);
            let lenB = Math.hypot(vB.x, vB.y);
            let size = 40; // 直角符號的大小
            let uA = { x: (vA.x / lenA) * size, y: (vA.y / lenA) * size };
            let uB = { x: (vB.x / lenB) * size, y: (vB.y / lenB) * size };
            
            let pt1 = new cv.Point(pCorner.x + uA.x, pCorner.y + uA.y);
            let pt2 = new cv.Point(pCorner.x + uA.x + uB.x, pCorner.y + uA.y + uB.y);
            let pt3 = new cv.Point(pCorner.x + uB.x, pCorner.y + uB.y);
            
            let color = new cv.Scalar(255, 215, 0, 255); // 金黃色
            cv.line(dst, pt1, pt2, color, 4);
            cv.line(dst, pt2, pt3, color, 4);
        };

        if (isRightAngle(a1)) drawRtSymbol(p1, p2, p3);
        if (isRightAngle(a2)) drawRtSymbol(p2, p1, p3);
        if (isRightAngle(a3)) drawRtSymbol(p3, p1, p2);

        // 畫頂點的可愛圓圈 (白色)
        let dotColor = new cv.Scalar(255, 255, 255, 255);
        cv.circle(dst, new cv.Point(p1.x, p1.y), 8, dotColor, -1);
        cv.circle(dst, new cv.Point(p2.x, p2.y), 8, dotColor, -1);
        cv.circle(dst, new cv.Point(p3.x, p3.y), 8, dotColor, -1);

        // --- 文字說明邏輯 ---
        let typeStr = "", color = "", reasonStr = "", rawTypeStr = "";

        if (isEquilateral) {
            typeStr = "👑 等邊三角形"; rawTypeStr = "等邊三角形"; color = "#9c27b0";
            reasonStr = "國王說：太完美了！它的三個邊「一模一樣長」（都顯示紅色），就像三胞胎一樣整齊！";
        } else if (isIsosceles && isRight) {
            typeStr = "✨ 等腰直角三角形"; rawTypeStr = "等腰直角三角形"; color = "#ff9800";
            reasonStr = "哇！它有兩個邊一樣長（都是紅色），而且角落有一個金黃色的「直角符號」，就像書本角落一樣方正！";
        } else if (isIsosceles) {
            typeStr = "👯 等腰三角形"; rawTypeStr = "等腰三角形"; color = "#4caf50";
            reasonStr = "你看！它有兩個邊是「一樣長」的喔（都是紅色）！就像長著兩條一樣長腿的精靈！";
        } else if (isRight) {
            typeStr = "📐 直角三角形"; rawTypeStr = "直角三角形"; color = "#2196f3";
            reasonStr = "發現了！角落有一個金黃色的「直角符號」，代表它像積木的角落一樣，可以站得很穩！(三條邊長都不一樣，所以有三種顏色)";
        } else {
            typeStr = "🎨 不等邊三角形"; rawTypeStr = "不等邊三角形"; color = "#e91e63";
            reasonStr = "這是一個很有個性的形狀！它的三個邊「都不一樣長」（呈現紅、藍、綠三種顏色），每個角也都不一樣大喔！";
        }

        updateUI(typeStr, color, reasonStr, rawTypeStr);
    }

    // 更新介面文字與顏色
    function updateUI(title, bgColor, desc, rawType = null) {
            let badge = document.getElementById('triangle-type');
            badge.innerText = title;
            badge.style.backgroundColor = bgColor;
            
            // 根據背景色自動計算一個深一點的顏色作為陰影
            let shadowColor = shadeColor(bgColor, -30);
            badge.style.boxShadow = `0 4px 0px ${shadowColor}`;
            
            document.getElementById('reason-text').innerText = desc;

            // 處理 Gemini API 按鈕顯示邏輯
            const askBtn = document.getElementById('ask-king-btn');
            const storyPanel = document.getElementById('story-panel');
            
            if (rawType) {
                if (rawType !== previousDetectedType) {
                    // 如果遇到「新種類」的三角形，才收起舊故事並重置按鈕
                    storyPanel.style.display = 'none';
                    askBtn.innerText = "✨ 聽國王說故事 ✨";
                    previousDetectedType = rawType;
                }
                currentDetectedType = rawType;
                
                if (!isStoryLoading) {
                    askBtn.classList.remove('hidden');
                }
            }
            // 備註：如果沒掃到三角形(rawType 為 null)，我們不隱藏按鈕和故事，
            // 這樣可以確保小朋友在閱讀故事時，手抖移開相機也不會讓故事突然消失。
        }

        // ✨ 呼叫 Gemini API 的主要函數 (讓國王說故事)
        async function askKing() {
            if (!currentDetectedType || isStoryLoading) return;
            
            const storyPanel = document.getElementById('story-panel');
            const askBtn = document.getElementById('ask-king-btn');
            
            isStoryLoading = true;
            askBtn.disabled = true;
            askBtn.innerText = "👑 國王正在思考中...";
            storyPanel.style.display = "block";
            storyPanel.innerHTML = "魔法傳送中，請稍候... ✨";

            // 專為小學生設計的 Prompt 指令
            const prompt = `你現在是「魔法三角形王國」的國王。請用繁體中文，針對「${currentDetectedType}」，跟一個小學三年級的學生說一段有趣、短短的魔法故事，或者告訴他在現實生活中哪裡可以找到這種形狀。字數大約 50-80 字，語氣要活潑可愛、充滿童趣，並且可以使用 emoji。請直接回答故事內容。`;

            try {
                const story = await callGeminiWithRetry(prompt);
                storyPanel.innerHTML = story.replace(/\n/g, '<br>');
                askBtn.innerText = "✨ 再聽一個故事 ✨";
            } catch (error) {
                console.error("Gemini API 錯誤:", error);
                storyPanel.innerHTML = "哎呀！魔法電波干擾，國王現在有點忙，晚點再試一次吧！ 🏰";
                askBtn.innerText = "✨ 重新呼叫國王 ✨";
            } finally {
                isStoryLoading = false;
                askBtn.disabled = false;
            }
        }

        // 具備 Exponential Backoff (指數退避) 的 API 呼叫函數
        async function callGeminiWithRetry(prompt, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    
                    if (!response.ok) throw new Error('API 回應錯誤');
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error('無法解析回傳內容');
                    }
                } catch (err) {
                    if (i === retries - 1) throw err; // 最後一次重試也失敗的話就丟出錯誤
                    await new Promise(res => setTimeout(res, delays[i])); // 等待後重試
                }
            }
        }

        // 輔助函數：用來加深顏色產生按鈕陰影效果
        function shadeColor(color, percent) {
            if (color.startsWith('#')) {
                let R = parseInt(color.substring(1,3),16);
                let G = parseInt(color.substring(3,5),16);
                let B = parseInt(color.substring(5,7),16);

                R = parseInt(R * (100 + percent) / 100);
                G = parseInt(G * (100 + percent) / 100);
                B = parseInt(B * (100 + percent) / 100);

                R = (R<255)?R:255;  
                G = (G<255)?G:255;  
                B = (B<255)?B:255;  

                let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
                let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
                let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));

                return "#"+RR+GG+BB;
            }
            return "#333"; // 預設陰影
        }

        // --- 自動備用線路載入器 (Smart Loader) ---
        // 解決網路阻擋問題：如果第一個網址失敗，會自動嘗試其他網址
        const cvUrls = [
            "https://docs.opencv.org/4.8.0/opencv.js", // 官方主線路
            "https://docs.opencv.org/4.5.4/opencv.js", // 官方備用線路
            "https://cdn.jsdelivr.net/gh/wallat/compiled-opencvjs/v4.2.0/opencv.js" // 全球 CDN 線路 (最不容易被擋)
        ];

        function tryLoadOpenCV(index) {
            if (index >= cvUrls.length) {
                onOpenCvError();
                return;
            }
            
            // 更新畫面提示
            if (index > 0) {
                let loadingText = document.querySelector('#loading-screen p');
                if(loadingText) loadingText.innerText = `被網路擋住了！正在切換第 ${index + 1} 條魔法連線... 請稍候！`;
            }

            let script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = cvUrls[index];
            
            script.onload = function() {
                // 保險機制：若不同版本導致 Module 觸發失敗，我們主動檢查是否可用
                setTimeout(function() {
                    if (typeof cv !== 'undefined' && document.getElementById('loading-screen').classList.contains('hidden') === false) {
                        onOpenCvReady();
                    }
                }, 2000);
            };
            
            script.onerror = function() {
                console.warn("無法從此來源載入: " + cvUrls[index]);
                tryLoadOpenCV(index + 1); // 失敗的話，自動嘗試下一個
            };
            
            document.body.appendChild(script);
        }

        // 開始自動載入
        tryLoadOpenCV(0);

</script>
